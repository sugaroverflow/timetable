# DigitalOcean App Platform spec — DEV (dev.timetable.love)
#
# App name: timetable-dev
# Deployed by deploy-dev.yml. GitHub Environment "timetable-dev", Clerk Development keys.

name: timetable-dev
region: lon

domains:
  - domain: dev.timetable.love
    type: PRIMARY

ingress:
  rules:
    - match: { path: { prefix: /api } }
      component: { name: api, preserve_path_prefix: true }
    - match: { path: { prefix: /graphql } }
      component: { name: api, preserve_path_prefix: true }
    - match: { path: { prefix: /health } }
      component: { name: api, preserve_path_prefix: true }
    - match: { path: { prefix: / } }
      component: { name: web }

services:
  - name: api
    github: { repo: sugaroverflow/timetable, branch: main, deploy_on_push: false }
    source_dir: /
    build_command: npm ci
    run_command: npm run start -w @timetable/api
    http_port: 4000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    health_check:
      http_path: /health
    envs:
      - { key: API_PORT, value: "4000", scope: RUN_TIME }
      - { key: DATABASE_URL, value: "${timetable-db.DATABASE_URL}", scope: RUN_TIME }
      - { key: DATABASE_SSL, value: "require", scope: RUN_TIME }
      - { key: WEB_ORIGIN, value: "${APP_URL}", scope: RUN_TIME }
      - { key: TRUST_PROXY_HOPS, value: "1", scope: RUN_TIME }
      - { key: RATE_LIMIT_BACKEND, value: "database", scope: RUN_TIME }
      - { key: RATE_LIMIT_KEY_PREFIX, value: "timetable:dev:api", scope: RUN_TIME }
      - { key: GRAPHQL_MAX_COST, value: "500", scope: RUN_TIME }
      - { key: CLERK_SECRET_KEY, value: "${CLERK_SECRET_KEY}", scope: RUN_TIME, type: SECRET }
      - { key: CRON_SECRET, value: "${CRON_SECRET}", scope: RUN_TIME, type: SECRET }
      - { key: RESEND_API_KEY, value: "${RESEND_API_KEY}", scope: RUN_TIME, type: SECRET }
      - { key: EMAIL_FROM, value: "${EMAIL_FROM}", scope: RUN_TIME }
      - { key: SPACES_ENDPOINT, value: "https://lon1.digitaloceanspaces.com", scope: RUN_TIME }
      - { key: SPACES_REGION, value: "lon1", scope: RUN_TIME }
      - { key: SPACES_BUCKET, value: "timetable", scope: RUN_TIME }
      - { key: SPACES_KEY_PREFIX, value: "uploads/dev", scope: RUN_TIME }
      - { key: SPACES_PUBLIC_BASE_URL, scope: RUN_TIME }
      - { key: SPACES_KEY, value: "${SPACES_KEY}", scope: RUN_TIME, type: SECRET }
      - { key: SPACES_SECRET, value: "${SPACES_SECRET}", scope: RUN_TIME, type: SECRET }

  - name: web
    image:
      registry_type: DOCR
      registry: timetable
      repository: web
      tag: DEPLOY_TAG
    http_port: 3000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    envs:
      - { key: GRAPHQL_ROUTE_URL, value: "${APP_URL}/graphql", scope: RUN_TIME }
      - { key: CLERK_SECRET_KEY, value: "${CLERK_SECRET_KEY}", scope: RUN_TIME, type: SECRET }

jobs:
  - name: migrate
    kind: PRE_DEPLOY
    github: { repo: sugaroverflow/timetable, branch: main, deploy_on_push: false }
    source_dir: /
    build_command: npm ci
    run_command: npm run db:migrate
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    envs:
      - { key: DATABASE_URL, value: "${timetable-db.DATABASE_URL}", scope: RUN_TIME }
      - { key: DATABASE_SSL, value: "require", scope: RUN_TIME }

  - name: seed-sample-data
    kind: POST_DEPLOY
    github: { repo: sugaroverflow/timetable, branch: main, deploy_on_push: false }
    source_dir: /
    build_command: |
      if [ "${SEED_DEV_SAMPLE_DATA:-false}" = "true" ]; then
        npm ci
      fi
    run_command: |
      if [ "$SEED_DEV_SAMPLE_DATA" = "true" ]; then
        echo "Resetting hosted dev sample database and Clerk sample users."
        SEED_DEV_RESET_DATABASE=true npm run db:seed
        npm run clerk:seed-dev-users
      else
        echo "Skipping dev sample data and Clerk user seed. Set seed_sample_data when manually dispatching Deploy Dev to run it."
      fi
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    envs:
      - { key: DATABASE_URL, value: "${timetable-db.DATABASE_URL}", scope: RUN_TIME }
      - { key: DATABASE_SSL, value: "require", scope: RUN_TIME }
      - { key: CLERK_SECRET_KEY, value: "${CLERK_SECRET_KEY}", scope: RUN_TIME, type: SECRET }
      - { key: SEED_DEV_SAMPLE_DATA, value: "${SEED_DEV_SAMPLE_DATA}", scope: RUN_TIME }

databases:
  # Existing cluster (currently attached to the app you are renaming to timetable-dev).
  - name: timetable-db
    engine: PG
    version: "16"
    production: true
    cluster_name: timetable-db
    db_name: defaultdb
    db_user: doadmin
