# DigitalOcean App Platform spec — PRODUCTION (timetable.love)
#
# App name: timetable (new app). Deployed manually via deploy-production.yml.
# GitHub Environment "production", Clerk Production live keys.
#
# Dev uses .do/app.dev.yaml → app timetable-dev @ dev.timetable.love

name: timetable
region: lon

# topic.forum is PRIMARY (APP_URL and all NEXT_PUBLIC_* URLs follow it);
# timetable.love stays as an alias through the transition.
domains:
  - domain: topic.forum
    type: PRIMARY
  - domain: www.topic.forum
    type: ALIAS
  - domain: timetable.love
    type: ALIAS
  - domain: www.timetable.love
    type: ALIAS

# HTTP routing on one domain. API owns /api, /graphql, /health; web owns the rest.
# preserve_path_prefix keeps the prefix so Express (mounted at /api, /graphql,
# /health) receives the full path instead of a stripped one.
ingress:
  rules:
    - match: { path: { prefix: /api } }
      component: { name: api, preserve_path_prefix: true }
    - match: { path: { prefix: /graphql } }
      component: { name: api, preserve_path_prefix: true }
    - match: { path: { prefix: /health } }
      component: { name: api, preserve_path_prefix: true }
    - match: { path: { prefix: / } }
      component: { name: web }

services:
  # API — Express + GraphQL Yoga, runs TypeScript via tsx (no build step).
  - name: api
    github: { repo: sugaroverflow/timetable, branch: main, deploy_on_push: false }
    source_dir: /
    build_command: npm ci
    run_command: npm run start -w @timetable/api
    http_port: 4000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    health_check:
      http_path: /health
    envs:
      - { key: API_PORT, value: "4000", scope: RUN_TIME }
      - { key: DATABASE_URL, value: "${timetable-db.DATABASE_URL}", scope: RUN_TIME }
      - { key: DATABASE_SSL, value: "require", scope: RUN_TIME }
      - { key: WEB_ORIGIN, value: "${APP_URL}", scope: RUN_TIME }
      - { key: TRUST_PROXY_HOPS, value: "1", scope: RUN_TIME }
      - { key: RATE_LIMIT_BACKEND, value: "database", scope: RUN_TIME }
      - { key: RATE_LIMIT_KEY_PREFIX, value: "timetable:production:api", scope: RUN_TIME }
      - { key: GRAPHQL_MAX_COST, value: "500", scope: RUN_TIME }
      - { key: CLERK_SECRET_KEY, value: "${CLERK_SECRET_KEY}", scope: RUN_TIME, type: SECRET }
      - { key: CRON_SECRET, value: "${CRON_SECRET}", scope: RUN_TIME, type: SECRET }
      - { key: RESEND_API_KEY, value: "${RESEND_API_KEY}", scope: RUN_TIME, type: SECRET }
      - { key: EMAIL_FROM, value: "${EMAIL_FROM}", scope: RUN_TIME }
      # Image uploads to Spaces (S3). Credentials come from the GitHub
      # Environment "production" via deploy-production.yml (the API refuses
      # to start when SPACES_BUCKET is set without KEY/SECRET).
      # Optionally also set SPACES_PUBLIC_BASE_URL for a CDN/custom domain.
      - { key: SPACES_ENDPOINT, value: "https://lon1.digitaloceanspaces.com", scope: RUN_TIME }
      - { key: SPACES_REGION, value: "lon1", scope: RUN_TIME }
      - { key: SPACES_BUCKET, value: "topicforum", scope: RUN_TIME }
      - { key: SPACES_KEY_PREFIX, value: "uploads/production", scope: RUN_TIME }
      - { key: SPACES_PUBLIC_BASE_URL, scope: RUN_TIME }
      - { key: SPACES_KEY, value: "${SPACES_KEY}", scope: RUN_TIME, type: SECRET }
      - { key: SPACES_SECRET, value: "${SPACES_SECRET}", scope: RUN_TIME, type: SECRET }

  # Web — Next.js (build then start). 1 GB so `next build` has headroom.
  - name: web
    github: { repo: sugaroverflow/timetable, branch: main, deploy_on_push: false }
    source_dir: /
    build_command: npm ci && npm run build -w @timetable/web
    run_command: npm run start -w @timetable/web
    http_port: 3000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    envs:
      - { key: NEXT_PUBLIC_API_URL, value: "${APP_URL}", scope: RUN_AND_BUILD_TIME }
      - { key: NEXT_PUBLIC_GRAPHQL_URL, value: "${APP_URL}/graphql", scope: RUN_AND_BUILD_TIME }
      - { key: GRAPHQL_ROUTE_URL, value: "${APP_URL}/graphql", scope: RUN_AND_BUILD_TIME }
      - { key: NEXT_PUBLIC_CLERK_SIGN_IN_URL, value: "/sign-in", scope: RUN_AND_BUILD_TIME }
      - { key: NEXT_PUBLIC_CLERK_SIGN_UP_URL, value: "/sign-up", scope: RUN_AND_BUILD_TIME }
      - { key: NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL, value: "/timetables", scope: RUN_AND_BUILD_TIME }
      - { key: NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL, value: "/timetables", scope: RUN_AND_BUILD_TIME }
      - { key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY, value: "${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}", scope: RUN_AND_BUILD_TIME }
      - { key: CLERK_SECRET_KEY, value: "${CLERK_SECRET_KEY}", scope: RUN_TIME, type: SECRET }

jobs:
  # Runs migrations before every deploy.
  - name: migrate
    kind: PRE_DEPLOY
    github: { repo: sugaroverflow/timetable, branch: main, deploy_on_push: false }
    source_dir: /
    build_command: npm ci
    run_command: npm run db:migrate
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    envs:
      - { key: DATABASE_URL, value: "${timetable-db.DATABASE_URL}", scope: RUN_TIME }
      - { key: DATABASE_SSL, value: "require", scope: RUN_TIME }

databases:
  # New production cluster (separate from timetable-db used by timetable-dev).
  - name: timetable-db
    engine: PG
    version: "16"
    production: true
    cluster_name: timetable-db-prod
    db_name: defaultdb
    db_user: doadmin
