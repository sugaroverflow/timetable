name: CI

on:
  push:
    branches: [main]
    paths:
      - ".do/**"
      - ".github/workflows/**"
      - "apps/**"
      - "packages/**"
      - "scripts/**"
      - "docker-compose.yml"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.base.json"
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: timetable
          POSTGRES_PASSWORD: timetable
          POSTGRES_DB: timetable
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U timetable -d timetable"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://timetable:timetable@localhost:5432/timetable
      DATABASE_SSL: disable
      AUTH_SECRET: ci-dummy-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Build first so Next.js generates its type files (next-env.d.ts) before
      # the standalone typecheck step runs against the web app.
      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm run test

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Browser smoke
        run: npm run test:e2e

      - name: Apply migrations
        run: npm run db:migrate
