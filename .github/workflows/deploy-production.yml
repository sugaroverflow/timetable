# Deploy production (new app timetable @ timetable.love). Manual only.
# Secrets: GitHub Environment "production" — see README § Environments.

name: Deploy Production

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy production to App Platform
        uses: digitalocean/app_action/deploy@v2
        env:
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          EMAIL_FROM: ${{ vars.EMAIL_FROM }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SPACES_KEY: ${{ secrets.SPACES_KEY }}
          SPACES_SECRET: ${{ secrets.SPACES_SECRET }}
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          app_spec_location: .do/app.yaml
          project_id: ${{ secrets.DIGITALOCEAN_PROJECT_ID }}
          print_build_logs: true
          print_deploy_logs: true

      - name: Smoke test production deployment
        run: |
          set -euo pipefail

          curl --fail --silent --show-error https://timetable.love/health \
            | grep -q '"ok":true'

          curl --fail --silent --show-error --output /dev/null \
            https://timetable.love/

          curl --fail --silent --show-error \
            --header "content-type: application/json" \
            --data '{"query":"query Smoke { __typename }"}' \
            https://timetable.love/graphql \
            | grep -q '"data"'
