# Deploy dev (timetable-dev @ dev.timetable.love) after CI passes on main.
# Secrets: GitHub Environment "timetable-dev" — see README § Environments.

name: Deploy Dev

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: timetable-dev
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Deploy timetable-dev to App Platform
        uses: digitalocean/app_action/deploy@v2
        env:
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          EMAIL_FROM: ${{ vars.EMAIL_FROM }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          app_spec_location: .do/app.dev.yaml
          project_id: ${{ secrets.DIGITALOCEAN_PROJECT_ID }}
          print_build_logs: true
          print_deploy_logs: true
