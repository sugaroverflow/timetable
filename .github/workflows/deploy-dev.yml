# Deploy dev (timetable-dev @ dev.timetable.love) after CI passes on main.
# Secrets: GitHub Environment "timetable-dev" — see README § Environments.

name: Deploy Dev

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      seed_sample_data:
        description: "Seed dev sample data after deploy"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: timetable-dev
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Deploy timetable-dev to App Platform
        uses: digitalocean/app_action/deploy@v2
        env:
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          EMAIL_FROM: ${{ vars.EMAIL_FROM }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SEED_DEV_SAMPLE_DATA: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.seed_sample_data == 'true' && 'true' || 'false' }}
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          app_spec_location: .do/app.dev.yaml
          project_id: ${{ secrets.DIGITALOCEAN_PROJECT_ID }}
          print_build_logs: true
          print_deploy_logs: true

      - name: Smoke test dev deployment
        run: |
          set -euo pipefail

          curl --fail --silent --show-error https://dev.timetable.love/health \
            | grep -q '"ok":true'

          curl --fail --silent --show-error --output /dev/null \
            https://dev.timetable.love/

          curl --fail --silent --show-error \
            --header "content-type: application/json" \
            --data '{"query":"query Smoke { __typename }"}' \
            https://dev.timetable.love/graphql \
            | grep -q '"data"'
